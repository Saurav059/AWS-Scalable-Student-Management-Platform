{% extends 'base.html' %}

{% block title %}Edit Course | AWS Student Platform{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{{ url_for('courses.details', id=course.id) }}" class="text-decoration-none text-muted small"><i class="fa-solid fa-arrow-left me-2"></i>Back to Course View</a>
    <h2 class="fw-bold text-dark mt-2">Update Course Details</h2>
    <p class="text-muted">Modify course parameters for <b>{{ course.course_code }}</b></p>
</div>

<div class="card bg-white shadow-sm max-width-container" style="max-width: 650px;">
    <div class="card-body p-4">
        <form action="{{ url_for('courses.edit', id=course.id) }}" method="POST">
            
            <div class="mb-3">
                <label for="course_code" class="form-label">Course Code *</label>
                <input type="text" name="course_code" id="course_code" class="form-control" value="{{ course.course_code }}" required>
            </div>

            <div class="mb-3">
                <label for="course_name" class="form-label">Course Title / Name *</label>
                <input type="text" name="course_name" id="course_name" class="form-control" value="{{ course.course_name }}" required>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="credit_hours" class="form-label">Credit Hours *</label>
                    <input type="number" name="credit_hours" id="credit_hours" class="form-control" min="1" max="6" value="{{ course.credit_hours }}" required>
                </div>
                <div class="col-md-6">
                    <label for="semester" class="form-label">Semester *</label>
                    <select name="semester" id="semester" class="form-select" required>
                        <option value="Fall 2026" {% if course.semester == 'Fall 2026' %}selected{% endif %}>Fall 2026</option>
                        <option value="Spring 2026" {% if course.semester == 'Spring 2026' %}selected{% endif %}>Spring 2026</option>
                        <option value="Summer 2026" {% if course.semester == 'Summer 2026' %}selected{% endif %}>Summer 2026</option>
                        <option value="Fall 2027" {% if course.semester == 'Fall 2027' %}selected{% endif %}>Fall 2027</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="department" class="form-label">Department *</label>
                <input type="text" name="department" id="department" class="form-control" value="{{ course.department }}" required>
            </div>

            <div class="mb-4">
                <label for="teacher_id" class="form-label">Assign Instructor</label>
                <select name="teacher_id" id="teacher_id" class="form-select border-info bg-light">
                    <option value="None" {% if not course.teacher_id %}selected{% endif %}>-- Keep Unassigned / TBD --</option>
                    {% for teacher in teachers %}
                    <option value="{{ teacher.id }}" {% if course.teacher_id == teacher.id %}selected{% endif %}>{{ teacher.full_name }} ({{ teacher.employee_id }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-4">
                <a href="{{ url_for('courses.details', id=course.id) }}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-success"><i class="fa-solid fa-floppy-disk me-2"></i>Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
